program: train_sweep.py
method: bayes
metric:
  name: val/rmsd_mask
  goal: minimize
parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 2e-5
    max: 2e-4
  batch_size:
    values: [2, 4]
  internal_patch_size:
    values: [2, 4] 
  hidden_size:
    values: [192, 384]
  depth:
    values: [4, 6]
  num_heads:
    values: [4, 6]
early_terminate:
  type: hyperband
  min_iter: 1000